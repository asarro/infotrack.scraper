services:
  seq:
    image: datalust/seq:latest
    environment:
      # Accept the Seq licence (required to start the container unattended).
      ACCEPT_EULA: "Y"
      # Local dev only: open the Seq UI without a login. Set a password instead
      # (SEQ_FIRSTRUN_ADMINPASSWORD) for any shared/persistent deployment.
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      # Host 5341 -> container 80 (Seq serves the UI, API, and ingestion on 80).
      - "5341:80"
    volumes:
      - seq-data:/data
    networks:
      - infotrack-network

volumes:
  seq-data:

networks:
  infotrack-network:
    name: infotrack-network
