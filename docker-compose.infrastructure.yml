services:
  postgres:
    image: postgres:17-bookworm
    environment:
      POSTGRES_DB: infotrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d infotrack"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - infotrack-network

volumes:
  postgres-data:

networks:
  infotrack-network:
    name: infotrack-network
